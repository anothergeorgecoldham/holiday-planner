<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holiday Planner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <div class="app-title">✈️ <span>Holiday</span> Planner</div>
  <div class="header-right">
    <div id="sync-status" class="sync-status"></div>
    <div id="auth-controls" class="auth-controls"></div>
    <div class="io-controls">
      <button class="btn btn-ghost btn-sm" id="btn-export" title="Export data to file">⬇ Export</button>
      <button class="btn btn-ghost btn-sm" id="btn-import" title="Import data from file">⬆ Import</button>
      <input type="file" id="file-input" accept=".hpd" style="display:none" />
    </div>
    <div class="nav-controls">
      <button id="btn-prev" title="Previous month">&#8249;</button>
      <span id="month-label"></span>
      <button id="btn-next" title="Next month">&#8250;</button>
      <select id="year-select"></select>
    </div>
  </div>
</header>

<div class="legend">
  <span class="legend-item"><span class="dot" style="background:var(--accent2)"></span> Fly out</span>
  <span class="legend-item"><span class="dot" style="background:var(--green)"></span> Fly in</span>
  <span class="legend-item"><span class="dot" style="background:var(--accent)"></span> Accommodation</span>
  <span class="legend-item"><span class="dot" style="background:var(--amber)"></span> Internal transit</span>
  <span class="legend-item"><span class="dot" style="background:var(--purple)"></span> Activity</span>
  <span class="legend-item"><span class="dot" style="background:var(--muted)"></span> Booking ref</span>
</div>

<div class="calendar" id="calendar"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-date-title"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>

    <div class="modal-fields-container">
      <div class="modal-fields" id="modal-fields">
        <div class="modal-field-wrapper" data-field="flights">
          <span class="drag-handle">⠿</span>
          <div class="checkbox-row">
            <label class="checkbox-label">
              <input type="checkbox" id="field-fly-out" />
              <span style="color:var(--accent2)">✈️ Fly out</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="field-fly-in" />
              <span style="color:var(--green)">🛬 Fly in</span>
            </label>
          </div>
        </div>

        <div class="modal-field-wrapper" data-field="accom">
          <span class="drag-handle">⠿</span>
          <div class="field-group">
            <label>🏨 Accommodation <span class="field-hint">(one per line)</span></label>
            <textarea id="field-accom" placeholder="Hotel / Airbnb / hostel name...&#10;e.g. Checking out: Hotel A&#10;Checking in: Hotel B" rows="2"></textarea>
          </div>
        </div>

        <div class="modal-field-wrapper" data-field="transit">
          <span class="drag-handle">⠿</span>
          <div class="field-group">
            <label>🚂 Internal transit <span class="field-hint">(one per line)</span></label>
            <textarea id="field-transit" placeholder="Train, bus, ferry, hire car...&#10;e.g. Bus: Sapa → Hanoi&#10;Flight: Hanoi → HCMC" rows="2"></textarea>
          </div>
        </div>

        <div class="modal-field-wrapper" data-field="activity">
          <span class="drag-handle">⠿</span>
          <div class="field-group">
            <label>🎯 Activities <span class="field-hint">(one per line)</span></label>
            <textarea id="field-activity" placeholder="Tours, excursions, plans...&#10;e.g. Morning: Temple visit&#10;Afternoon: Cooking class"></textarea>
          </div>
        </div>

        <div class="modal-field-wrapper" data-field="ref">
          <span class="drag-handle">⠿</span>
          <div class="field-group">
            <label>🔖 Booking references <span class="field-hint">(one per line)</span></label>
            <textarea id="field-ref" placeholder="e.g. BA12345&#10;Booking.com: 9876543" rows="2"></textarea>
          </div>
        </div>

        <div class="modal-field-wrapper" data-field="notes">
          <span class="drag-handle">⠿</span>
          <div class="field-group">
            <label>📝 Notes</label>
            <textarea id="field-notes" placeholder="Anything else..."></textarea>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-danger" id="btn-clear">Clear day</button>
      <button class="btn btn-ghost" id="btn-cancel">Cancel</button>
      <button class="btn btn-primary" id="btn-save">Save</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
